name: Feature request
description: Suggest an improvement for CervTerm
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What user workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should CervTerm do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Product / UX
        - Terminal correctness
        - Rendering / fonts / emoji
        - Packaging / install
        - Configuration
        - Maintainability / architecture
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
