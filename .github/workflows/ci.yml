name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: VT parser fuzz smoke
        run: go test ./internal/vt -run '^$' -fuzz=FuzzParserAdvanceDoesNotPanic -fuzztime=2s
      - name: GLFW compile check
        run: go test -tags glfw ./internal/frontend/glfwgl ./cmd/cervterm -run '^$' -count=0
      - name: Generate Windows resources
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/generate-windows-resource.ps1 -Arch amd64
      - name: Build Windows beta zip
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/package-beta.ps1 -Version 0.1.0-ci -OutDir dist
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/release-preflight.ps1 -Version 0.1.0-ci -OutDir dist -WindowsZip dist\cervterm-0.1.0-ci-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: cervterm-windows-zip
          path: dist\*.zip

  linux-headless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...
      - name: Build Linux headless beta zip
        run: |
          mkdir -p dist/cervterm-linux-headless
          go build -o dist/cervterm-linux-headless/cervterm-linux-amd64 ./cmd/cervterm
          ./dist/cervterm-linux-headless/cervterm-linux-amd64 --print-default-config > dist/cervterm-linux-headless/cervterm.lua
          cp README.md CHANGELOG.md dist/cervterm-linux-headless/
          cp -R docs dist/cervterm-linux-headless/docs
          python -m zipfile -c dist/cervterm-linux-headless.zip dist/cervterm-linux-headless
      - uses: actions/upload-artifact@v4
        with:
          name: cervterm-linux-headless-zip
          path: dist/cervterm-linux-headless.zip
