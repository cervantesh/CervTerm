name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Maturity gates
        run: go run ./scripts/check-maturity-gates.go
      - name: Generate Windows resources
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/generate-windows-resource.ps1 -Arch amd64
      - name: Build Windows package
        run: |
          $version = "${{ github.ref_name }}"
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/package-beta.ps1 -Version $version -OutDir dist
      - name: Authenticode sign Windows executable
        env:
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          $version = "${{ github.ref_name }}"
          if (-not $env:WINDOWS_CODESIGN_PFX_BASE64 -or -not $env:WINDOWS_CODESIGN_PASSWORD) {
            Write-Host "Code-signing secrets are not configured; skipping Authenticode signing."
            exit 0
          }
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/sign-windows-exe.ps1 -ExePath dist\cervterm-$version-windows\cervterm.exe -PfxBase64 $env:WINDOWS_CODESIGN_PFX_BASE64 -PfxPassword $env:WINDOWS_CODESIGN_PASSWORD
      - name: Package signed Windows zip
        run: |
          $version = "${{ github.ref_name }}"
          Remove-Item -Force dist\cervterm-$version-windows.zip -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\cervterm-$version-windows\* -DestinationPath dist\cervterm-$version-windows.zip
      - name: Release preflight (Windows package)
        run: |
          $version = "${{ github.ref_name }}"
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/release-preflight.ps1 -Version $version -OutDir dist -WindowsZip dist\cervterm-$version-windows.zip
      - name: Installed package smoke
        run: |
          $version = "${{ github.ref_name }}"
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/smoke-installed-package.ps1 -ZipPath dist\cervterm-$version-windows.zip -ExpectedVersion $version
      - uses: actions/upload-artifact@v4
        with:
          name: cervterm-windows-amd64
          path: dist\*.zip

  linux-headless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Maturity gates
        run: go run ./scripts/check-maturity-gates.go
      - name: Build Linux headless zip
        run: |
          version="${{ github.ref_name }}"
          mkdir -p "dist/cervterm-$version-linux-headless-amd64"
          go build -ldflags "-X cervterm/internal/buildinfo.Version=$version" -o "dist/cervterm-$version-linux-headless-amd64/cervterm-linux-amd64" ./cmd/cervterm
          "dist/cervterm-$version-linux-headless-amd64/cervterm-linux-amd64" --print-default-config > "dist/cervterm-$version-linux-headless-amd64/cervterm.lua"
          cp README.md CHANGELOG.md SUPPORT.md "dist/cervterm-$version-linux-headless-amd64/"
          cp -R docs "dist/cervterm-$version-linux-headless-amd64/docs"
          python -m zipfile -c "dist/cervterm-$version-linux-headless-amd64.zip" "dist/cervterm-$version-linux-headless-amd64"
      - uses: actions/upload-artifact@v4
        with:
          name: cervterm-linux-headless-amd64
          path: dist/*.zip

  publish:
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux-headless
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: cervterm-*
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.zip
            dist/SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true
