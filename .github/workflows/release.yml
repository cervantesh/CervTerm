name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write


jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Resolve release version
        run: go run ./scripts/resolve-release-version.go
      - name: Maturity gates
        run: go run ./scripts/check-maturity-gates.go
      - name: Generate Windows resources
        run: |
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          go run ./scripts/generate-windows-resource.go -arch amd64 -version "%RELEASE_VERSION%"
      - name: Build Windows package
        run: |
          go run ./scripts/package-beta.go -version "%RELEASE_VERSION%" -outdir dist
      - name: Authenticode sign Windows executable
        env:
          WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          WINDOWS_CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          go run ./scripts/sign-windows-exe.go -exe "dist\cervterm-%RELEASE_VERSION%-windows\cervterm.exe" -skip-if-missing
      - name: Package signed Windows zip
        run: |
          go run ./scripts/package-beta.go -version "%RELEASE_VERSION%" -outdir dist -reuse
      - name: Release preflight (Windows package)
        run: |
          go run ./scripts/release-preflight.go -version "%RELEASE_VERSION%" -outdir dist -windows-zip "dist\cervterm-%RELEASE_VERSION%-windows.zip"
      - name: Installed package smoke
        run: |
          go run ./scripts/smoke-installed-package.go -zip "dist\cervterm-%RELEASE_VERSION%-windows.zip" -expected-version "%RELEASE_VERSION%"
      - name: Daily-driver smoke
        run: |
          go run ./scripts/daily-driver-smoke.go -cervterm "dist\cervterm-%RELEASE_VERSION%-windows\cervterm.exe" -workdir dist\daily-driver-smoke
      - uses: actions/upload-artifact@v7
        with:
          name: cervterm-windows-amd64
          path: |
            dist\*.zip
            dist\daily-driver-smoke\*

  linux-headless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Resolve release version
        run: go run ./scripts/resolve-release-version.go
      - name: Maturity gates
        run: go run ./scripts/check-maturity-gates.go
      - name: Build Linux headless zip
        run: |
          version="$RELEASE_VERSION"
          mkdir -p "dist/cervterm-$version-linux-headless-amd64"
          go build -ldflags "-X cervterm/internal/buildinfo.Version=$version" -o "dist/cervterm-$version-linux-headless-amd64/cervterm-linux-amd64" ./cmd/cervterm
          "dist/cervterm-$version-linux-headless-amd64/cervterm-linux-amd64" --print-default-config > "dist/cervterm-$version-linux-headless-amd64/cervterm.lua"
          cp README.md CHANGELOG.md SUPPORT.md "dist/cervterm-$version-linux-headless-amd64/"
          cp -R docs "dist/cervterm-$version-linux-headless-amd64/docs"
          python -m zipfile -c "dist/cervterm-$version-linux-headless-amd64.zip" "dist/cervterm-$version-linux-headless-amd64"
      - uses: actions/upload-artifact@v7
        with:
          name: cervterm-linux-headless-amd64
          path: dist/*.zip

  publish:
    runs-on: ubuntu-latest
    needs:
      - windows
      - linux-headless
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: cervterm-*
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.zip
            dist/SHA256SUMS.txt
      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
          generate_release_notes: true
